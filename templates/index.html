<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StockPulse — Real-Time Analyzer</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<style>

:root{
  --bg:#07090d;
  --surface:#0c0f14;
  --card:#10141b;
  --border:#1c2535;
  --border2:#283449;
  --text:#c8d6e5;
  --muted:#5a7080;
  --accent:#00c8f0;
  --green:#34d058;
  --yellow:#d4a017;
  --red:#f04848;
  --lime:#7ee787;
  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
}

.logo{
  font-family:var(--mono);
  font-size:14px;
  font-weight:600;
  color:var(--accent);
}

.hero{
  max-width:800px;
  margin:50px auto;
  padding:0 24px;
  text-align:center;
}

.hero-title{
  font-size:36px;
  margin-bottom:12px;
}

.hero-sub{
  color:var(--muted);
  margin-bottom:30px;
}

.search-wrap{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}

.search-row{
  display:flex;
  gap:10px;
}

#ticker-input{
  flex:1;
  height:48px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:white;
  padding:0 16px;
  font-size:15px;
}

#ticker-input:focus{
  outline:none;
  border-color:var(--accent);
}

#analyze-btn{
  height:48px;
  padding:0 24px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:black;
  font-weight:600;
  cursor:pointer;
}

#loading{
  display:none;
  text-align:center;
  margin-top:40px;
}

#error-box{
  display:none;
  max-width:900px;
  margin:20px auto;
  padding:0 24px;
}

.err-inner{
  background:rgba(240,72,72,0.08);
  border:1px solid rgba(240,72,72,0.3);
  color:var(--red);
  padding:14px;
  border-radius:8px;
}

#summary-bar{
  display:none;
  max-width:1100px;
  margin:20px auto;
  padding:0 24px;
}

.summary-inner{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

.summ-item{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.summ-lbl{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
}

.summ-val{
  font-size:22px;
  font-family:var(--mono);
}

#results-section{
  display:none;
  max-width:1100px;
  margin:0 auto;
  padding:0 24px 80px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;
}

.stock-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.card-head{
  padding:18px;
  display:flex;
  justify-content:space-between;
}

.card-ticker{
  font-size:24px;
  font-family:var(--mono);
  color:white;
}

.card-company{
  color:var(--muted);
  font-size:12px;
}

.sig-badge{
  padding:6px 12px;
  border-radius:6px;
  font-size:11px;
  font-weight:600;
}

.sig-buy{
  background:rgba(52,208,88,0.12);
  color:var(--green);
}

.sig-hold{
  background:rgba(212,160,23,0.12);
  color:var(--yellow);
}

.sig-avoid{
  background:rgba(240,72,72,0.12);
  color:var(--red);
}

.card-price{
  padding:0 18px 18px;
}

.price-big{
  font-size:34px;
  font-family:var(--mono);
  color:white;
}

.price-delta{
  margin-top:4px;
  font-family:var(--mono);
}

.col-up{color:var(--green);}
.col-down{color:var(--red);}
.col-flat{color:var(--muted);}

.ind-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border);
}

.ind-cell{
  background:var(--card);
  padding:12px;
}

.ind-lbl{
  font-size:10px;
  color:var(--muted);
  margin-bottom:5px;
}

.ind-val{
  font-family:var(--mono);
  color:white;
}

.error-card{
  background:rgba(240,72,72,0.05);
  border:1px solid rgba(240,72,72,0.2);
  padding:20px;
  border-radius:12px;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    STOCKPULSE
  </div>

  <div id="clock"></div>
</header>

<section class="hero">

  <h1 class="hero-title">
    Stock signals instantly
  </h1>

  <p class="hero-sub">
    Live RSI, MACD, EMA crossover and technical analysis
  </p>

  <div class="search-wrap">

    <div class="search-row">

      <input
        id="ticker-input"
        type="text"
        placeholder="AAPL, TSLA, NVDA"
      />

      <button id="analyze-btn" onclick="runAnalysis()">
        ANALYZE
      </button>

    </div>

  </div>

</section>

<div id="loading">
  Loading...
</div>

<div id="error-box">
  <div class="err-inner">
    <span id="error-text"></span>
  </div>
</div>

<div id="summary-bar">
  <div class="summary-inner" id="summary-inner"></div>
</div>

<section id="results-section">

  <div class="cards-grid" id="cards-grid"></div>

</section>

<script>

const API = "";

function updateClock(){

  const now = new Date();

  document.getElementById("clock").textContent =
    now.toUTCString().slice(17,25);
}

setInterval(updateClock,1000);

updateClock();

document
.getElementById("ticker-input")
.addEventListener("keydown",e=>{

  if(e.key==="Enter"){
    runAnalysis();
  }
});

async function runAnalysis(){

  const raw =
    document.getElementById("ticker-input")
    .value
    .trim();

  if(!raw){
    return;
  }

  setError("");

  show("loading");

  hide("results-section");

  hide("summary-bar");

  document.getElementById("cards-grid").innerHTML="";

  try{

    const res = await fetch(`${API}/analyze`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        tickers:raw
      })
    });

    if(!res.ok){
      throw new Error("Backend error");
    }

    const data = await res.json();

    renderAll(data.results);

  }catch(err){

    setError(err.message);

  }finally{

    hide("loading");
  }
}

function renderAll(results){

  const grid =
    document.getElementById("cards-grid");

  let buys=0;
  let holds=0;
  let avoids=0;

  results.forEach(r=>{

    if(r.error){

      grid.insertAdjacentHTML(
        "beforeend",
        errorCardHTML(r)
      );

      return;
    }

    if(r.signal.includes("BUY")){
      buys++;
    }else if(r.signal==="HOLD"){
      holds++;
    }else{
      avoids++;
    }

    grid.insertAdjacentHTML(
      "beforeend",
      stockCardHTML(r)
    );
  });

  document.getElementById("summary-inner").innerHTML = `

    <div class="summ-item">
      <div class="summ-lbl">Analyzed</div>
      <div class="summ-val">${results.length}</div>
    </div>

    <div class="summ-item">
      <div class="summ-lbl">Buy</div>
      <div class="summ-val" style="color:var(--green)">
        ${buys}
      </div>
    </div>

    <div class="summ-item">
      <div class="summ-lbl">Hold</div>
      <div class="summ-val" style="color:var(--yellow)">
        ${holds}
      </div>
    </div>

    <div class="summ-item">
      <div class="summ-lbl">Avoid</div>
      <div class="summ-val" style="color:var(--red)">
        ${avoids}
      </div>
    </div>

  `;

  show("summary-bar");

  show("results-section");
}

function stockCardHTML(r){

  const ind = r.indicators || {};

  const sigClass =
    r.signal.includes("BUY")
    ? "sig-buy"
    : r.signal==="HOLD"
    ? "sig-hold"
    : "sig-avoid";

  const chg =
    Number(r.price?.change || 0);

  const chgPct =
    Number(r.price?.change_pct || 0);

  const chgClass =
    chg>0
    ? "col-up"
    : chg<0
    ? "col-down"
    : "col-flat";

  const chgSign =
    chg>0 ? "+" : "";

  return `

  <div class="stock-card">

    <div class="card-head">

      <div>

        <div class="card-ticker">
          ${r.ticker}
        </div>

        <div class="card-company">
          ${r.company_name || ""}
        </div>

      </div>

      <div class="sig-badge ${sigClass}">
        ${r.signal}
      </div>

    </div>

    <div class="card-price">

      <div class="price-big">
        $${Number(
          r.price?.current || 0
        ).toFixed(2)}
      </div>

      <div class="price-delta ${chgClass}">
        ${chgSign}${chg}
        (${chgSign}${chgPct}%)
      </div>

    </div>

    <div class="ind-grid">

      <div class="ind-cell">
        <div class="ind-lbl">RSI</div>
        <div class="ind-val">
          ${ind.rsi || "-"}
        </div>
      </div>

      <div class="ind-cell">
        <div class="ind-lbl">MACD</div>
        <div class="ind-val">
          ${ind.macd || "-"}
        </div>
      </div>

      <div class="ind-cell">
        <div class="ind-lbl">EMA20</div>
        <div class="ind-val">
          ${ind.ema20 || "-"}
        </div>
      </div>

    </div>

  </div>

  `;
}

function errorCardHTML(r){

  return `

    <div class="error-card">

      <h3>${r.ticker}</h3>

      <p>${r.error}</p>

    </div>

  `;
}

function show(id){
  document.getElementById(id).style.display="block";
}

function hide(id){
  document.getElementById(id).style.display="none";
}

function setError(msg){

  const box =
    document.getElementById("error-box");

  if(msg){

    document.getElementById(
      "error-text"
    ).textContent = msg;

    box.style.display = "block";

  }else{

    box.style.display = "none";
  }
}

</script>

</body>
</html>
